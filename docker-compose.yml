services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: subastar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/schema_complemento.sql:/docker-entrypoint-initdb.d/02_schema_complemento.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subastar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: subastar
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_MAX: 10
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE_MB: 5
      FINE_PERCENTAGE: 10
      FINE_DEADLINE_HOURS: 72
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  mobile:
    build:
      context: ./mobile
    restart: unless-stopped
    environment:
      # Cambiá HOST_IP por la IP de tu máquina para que el dispositivo
      # o el emulador pueda conectarse al servidor Metro desde la red local.
      # Ejemplo: HOST_IP=192.168.1.50 docker compose up
      HOST_IP: ${HOST_IP:-localhost}
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - backend

volumes:
  pg_data:
  uploads_data:
